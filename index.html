<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azariah's Personal Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Entire body -->
    <div class="crafting-container">
      <!-- The top crafting section -->
      <div class="top-container">
        <!-- The book icon -->
        <div class="book-section">
          <button class="book-btn"><img src="assets/book.png" /></button>
        </div>

        <div class="crafting-set">
          <h2 class="text">Crafting</h2>
          <div class="crafting-grid">
            <div cellIndex="0" class="box"></div>
            <div cellIndex="1" class="box"></div>
            <div cellIndex="2" class="box"></div>
            <div cellIndex="3" class="box"></div>
            <div cellIndex="4" class="box"></div>
            <div cellIndex="5" class="box"></div>
            <div cellIndex="6" class="box"></div>
            <div cellIndex="7" class="box"></div>
            <div cellIndex="8" class="box"></div>
          </div>
        </div>

        <div class="output-box">
          <div id="outIndex" class="singular box"></div>
        </div>
      </div>

      <!-- Inventory Section! -->
      <div class="bottom-section">
        <div class="inventory">
          <h1 class="text">Inventory</h1>

          <div class="inventory-grid">
            <div invIndex="0" class="box"></div>
            <div invIndex="1" class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
          </div>

          <!-- hot bar area -->
          <div class="final-row">
            <div id="item0" class="box"></div>
            <div id="item1" class="box"></div>
            <div id="item2" class="box"></div>
            <div id="item3" class="box"></div>
            <div id="item4" class="box"></div>
            <div id="item5" class="box"></div>
            <div id="item6" class="box"></div>
            <div id="item7" class="box"></div>
            <div id="item8" class="box"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
